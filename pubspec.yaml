name: hangout
description: A trust-first location-based social coordination app.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation & Routing
  go_router: ^13.0.0
  
  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_database: ^11.0.0
  google_sign_in: ^6.2.1
  
  # Maps
  google_maps_flutter: ^2.6.0
  geoflutterfire_plus: ^0.0.1
  
  # UI & Glassmorphism
  glass_kit: ^4.0.2
  font_awesome_flutter: ^10.7.0
  flutter_animate: ^4.5.0
  
  # State Management
  provider: ^6.1.1
  
  # Utilities
  intl: ^0.19.0
  lucide_icons_flutter: ^3.1.12
  google_fonts: ^6.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
